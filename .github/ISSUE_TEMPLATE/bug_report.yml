name: Bug Report
description: Something isn't working as expected
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill this out as completely as you can — vague reports are hard to reproduce and fix.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I drag a tile to the right edge, the grid layout breaks..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Create a new grid
        2. Add a Text tile
        3. Drag it to column 16
        4. See the grid overflow the container
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: tile-type
    attributes:
      label: Affected tile type (if applicable)
      options:
        - Not tile-specific
        - Text
        - Image
        - Video
        - Link
        - Embed
        - Map
        - YouTube
        - Music
        - Profile
        - Chat
        - RPG / Game
        - Roadmap Feed
        - Other
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: "Chrome 131 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Console errors (if any)
      description: Open DevTools → Console and paste any red errors here.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this isn't a duplicate
          required: true
        - label: I can reproduce this consistently (not a one-time fluke)
          required: true
