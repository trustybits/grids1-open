name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  # Cancel in-progress runs for the same branch on new pushes
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Type Check ──────────────────────────────────────────────────────────
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run vue-tsc
        run: npm run type-check

  # ── Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── Unit Tests ──────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test:run

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ── Build ───────────────────────────────────────────────────────────────
  # Validates the production build succeeds. This catches vite config errors
  # and missing env vars that type-check alone won't catch.
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [type-check, lint, test]
    env:
      # Use empty stubs for build-time env vars — real values are on Vercel
      VITE_FIREBASE_API_KEY: stub
      VITE_FIREBASE_AUTH_DOMAIN: stub.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: stub
      VITE_FIREBASE_STORAGE_BUCKET: stub.appspot.com
      VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      VITE_FIREBASE_APP_ID: "1:000000000000:web:stub"
      VITE_POSTHOG_KEY: ""
      VITE_MAPBOX_TOKEN: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build-only

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 3

  # ── Functions Type Check ─────────────────────────────────────────────────
  functions-type-check:
    name: Functions Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        run: npm ci

      - name: Type check functions
        run: npm run build
