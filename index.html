<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">

    <script>
      (function () {
        var isLocalhost =
          location.hostname === 'localhost' ||
          location.hostname === '127.0.0.1' ||
          location.hostname === '::1';

        // Note: <script type="module"> is deferred, which can be too late for favicons.
        // Create the favicon link synchronously while parsing the <head>.
        var href = isLocalhost ? '/dev_favicon.png?v=dev' : '/favicon.png';

        var link = document.createElement('link');
        link.id = 'app-favicon';
        link.rel = 'icon';
        link.href = href;
        document.head.appendChild(link);
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grids</title>

    <link href='https://fonts.googleapis.com/css?family=Inter' rel='stylesheet'>
    <link href='https://fonts.googleapis.com/css2?family=Geist+Mono&display=swap' rel='stylesheet'>
    <link href='https://fonts.googleapis.com/css2?family=Lobster&display=swap' rel='stylesheet'>

    <script type="text/javascript">
      (function () {
        try {
          var storedThemeId = localStorage.getItem('themeId');
          var legacyDarkMode = localStorage.getItem('darkMode');

          var themeId = null;
          if (storedThemeId === 'dark' || storedThemeId === 'light') {
            themeId = storedThemeId;
          } else if (legacyDarkMode !== null) {
            themeId = legacyDarkMode === 'true' ? 'dark' : 'light';
          } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            themeId = 'dark';
          } else {
            themeId = 'light';
          }

          var root = document.documentElement;
          root.classList.remove('theme-light', 'theme-dark');
          root.classList.add('theme-' + themeId);
        } catch (e) {
          document.documentElement.classList.add('theme-light');
        }
      })();
    </script>

    <script type="text/javascript">
      (function(c,l,a,r,i,t,y){
          c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
          t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "qdgnl1rhbc");
  </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
